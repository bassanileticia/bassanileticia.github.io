<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Aluno</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.login.css">
    <link rel="stylesheet" href="assets/css/style.cadastro.css">
</head>

<body>

    <img src="assets/img/logo Sesi.jpg" alt="">

    <nav align="center">
        <a href="cadastro.html">Cadastro</a> |
        <a href="contato.html">Contato</a> 
    </nav>

    <h1>Cadastro do Aluno</h1>

    <form action="login.html" method="post">

        <label>Nome completo:</label><br>
        <input type="text" name="nome" required><br><br>

        <label>Data de nascimento:</label><br>
        <input type="date" name="nascimento"><br><br>

        <p>Sexo:</p>

        <label>
            <input type="radio" name="sexo"> Masculino
        </label><br>

        <label>
            <input type="radio" name="sexo"> Feminino
        </label><br>

        <label>
            <input type="radio" name="sexo"> Outro
        </label>

        <p>Interesses extracurriculares:</p>

        <label>
            <input type="checkbox"> Leitura
        </label><br>

        <label>
            <input type="checkbox"> Música
        </label><br>

        <label>
            <input type="checkbox"> Esportes
        </label><br>

        <label>
            <input type="checkbox"> Tecnologia
        </label>

        <label>Cidade:</label><br>
        <input type="text" name="cidade"><br><br>

        <label>Estado:</label><br>
        <select name="estado">
            <option value="">Selecione</option>
            <option value="SP">São Paulo</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="MG">Minas Gerais</option>
            <option value="PR">Paraná</option>
            <option value="RS">Rio Grande do Sul</option>
        </select><br><br>

        <button type="submit">Cadastrar</button>

    </form>

    <footer>
    <p>&copy; 2026 - Portal do Aluno | Desenvolvido por Letícia Bassani</p>
    </footer>

</body>

</html>
